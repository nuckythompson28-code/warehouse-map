<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f9f7f4"/>
<title>🏭 창고 맵</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');


:root{
  --bg:#f5f3f0;--surface:#ffffff;--surface2:#f0ede8;--border:#e5e0d8;
  --accent:#d97706;--active:#059669;--hold:#d97706;--text:#1c1917;--muted:#78716c;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --반박스:#6366f1;--풀박스:#9333ea;--흰색:#64748b;--노란색:#d97706;--초소형:#0891b2;--서랍:#db2777;
  --CN10:#d97706;--CN20:#374151;--RS40:#0d9488;--RS20:#6b7280;--CM20:#a07850;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard','IBM Plex Sans KR',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;padding-bottom:80px}

/* ── 상단 헤더 ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:12px 16px 10px;box-shadow:var(--shadow);
}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-family:'IBM Plex Mono';font-size:16px;font-weight:700;color:var(--accent)}
.topbar-actions{display:flex;gap:8px}
.icon-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:7px 10px;font-size:13px;cursor:pointer;color:var(--text);
  display:flex;align-items:center;gap:4px;box-shadow:var(--shadow);
}
.search-bar{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  display:flex;align-items:center;gap:8px;padding:9px 12px;box-shadow:var(--shadow);
}
.search-bar input{
  flex:1;background:none;border:none;color:var(--text);font-size:14px;outline:none;
  font-family:'IBM Plex Sans KR';
}
.search-bar input::placeholder{color:var(--muted)}
.search-clear{color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;display:none}

/* ── 바텀 탭바 ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);border-top:1px solid var(--border);backdrop-filter:blur(12px);
  display:flex;padding-bottom:var(--safe-bottom);
}
.tabbar-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;cursor:pointer;gap:3px;
  font-size:10px;color:var(--muted);font-family:'IBM Plex Mono';
  transition:color .12s;
}
.tabbar-item.on{color:var(--accent);font-weight:600}
.tabbar-icon{font-size:20px;line-height:1}

/* ── 패널 ── */
.panel{display:none;padding:12px 16px}
.panel.on{display:block}

/* ── 통계 칩 ── */
.stats-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-chip{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:6px 12px;box-shadow:var(--shadow);font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.stat-chip b{font-family:'IBM Plex Mono';color:var(--text)}
.sdot{width:7px;height:7px;border-radius:50%}

/* ── 필터 칩 ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fchip{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;box-shadow:var(--shadow);
}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(217,119,6,.3)}

/* ── 조감도 그리드 ── */
.overview-grid{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.aisle-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md)}
.aisle-label{
  background:var(--surface2);padding:8px 14px;
  font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.aisle-label::before{content:"";flex:1;height:1px;background:var(--border)}
.aisle-label::after{content:"";flex:1;height:1px;background:var(--border)}
.aisle-sections{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.ov-sec{
  background:var(--surface);padding:12px 14px;cursor:pointer;
  transition:all .15s;
}
.ov-sec:hover{background:var(--surface2)}.ov-sec:active{background:var(--surface2)}
.ov-sec-name{font-family:'IBM Plex Mono';font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
.ov-sec.mirror .ov-sec-name{text-align:right}
.ov-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.ov-sec.mirror .ov-chips{justify-content:flex-end}
.ov-chip{font-size:10px;font-family:'IBM Plex Mono';padding:2px 7px;border-radius:10px}
.ov-chip.in{background:rgba(16,185,129,.15);color:#059669;font-weight:700}
.ov-chip.empty{background:rgba(148,163,184,.15);color:#64748b}
.ov-chip.unused{background:rgba(0,0,0,.06);color:#94a3b8;text-decoration:line-through}
.ov-floor-bars{display:flex;flex-direction:column;gap:3px}
.ov-fbar{display:flex;align-items:center;gap:6px}
.ov-fbar-lbl{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono';width:16px;text-align:right;flex-shrink:0}
.ov-fbar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex}
.ov-fbar-active{background:#34d399;height:100%}
.ov-fbar-hold{background:#fbbf24;height:100%}
.ov-fbar-none{background:#1e2940;height:100%}
.ov-fbar-cnt{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono';width:22px}

/* ── 섹션 목록 ── */
.section-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.sec-row{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all .15s;box-shadow:var(--shadow);
}
.sec-row:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-1px)}.sec-row:active{border-color:var(--accent)}
.sec-row-left{display:flex;align-items:center;gap:12px}
.sec-badge{
  font-family:'IBM Plex Mono';font-size:18px;font-weight:700;color:var(--accent);
  background:rgba(56,189,248,.1);border-radius:10px;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sec-info{display:flex;flex-direction:column;gap:3px}
.sec-name{font-family:'IBM Plex Mono';font-size:14px;font-weight:600;color:var(--text)}
.sec-sub{font-size:11px;color:var(--muted);display:flex;gap:8px}
.sec-chevron{color:var(--muted);font-size:18px}

/* ── 섹션 상세 (드릴다운) ── */
.detail-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.back-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:14px;cursor:pointer;color:var(--text);flex-shrink:0;box-shadow:var(--shadow);
}
.detail-title{font-family:'IBM Plex Mono';font-size:18px;font-weight:700;color:var(--accent)}

.floor-block{margin-bottom:16px}
.floor-hd{
  font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.floor-hd::after{content:"";flex:1;height:1px;background:var(--border)}


/* ── 전체뷰 ── */
#panel-full{overflow:hidden;position:relative;}
.full-warehouse{
  display:flex;flex-direction:column;gap:20px;
  padding:16px 20px;min-width:max-content;
}
.full-aisle{display:flex;flex-direction:column;gap:4px}
.full-aisle-label{
  font-family:'IBM Plex Mono';font-size:11px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:10px;padding:6px 0;
  letter-spacing:.5px;text-transform:uppercase;
}
.full-aisle-label::before,.full-aisle-label::after{content:"";flex:1;height:1px;background:var(--border)}
.full-pair{display:flex;flex-direction:column;gap:3px}
.full-section{display:flex;flex-direction:column;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow)}
.full-sec-hd{
  font-family:'IBM Plex Mono';font-size:11px;font-weight:700;
  color:var(--accent);padding:0 0 6px;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid var(--border);margin-bottom:4px;
}
.full-floor-row{display:flex;align-items:flex-start;gap:3px}
.full-floor-lbl{
  font-family:'IBM Plex Mono';font-size:9px;color:var(--muted);
  width:18px;flex-shrink:0;padding-top:36px;text-align:right;
}
.full-slots{display:flex;gap:3px;align-items:center;flex-wrap:nowrap}
.full-slots.mirrored{flex-direction:row-reverse}

/* ── 슬롯 렌더링 ── */
.slots-row{display:flex;flex-wrap:nowrap;gap:3px;align-items:center;overflow-x:auto;padding-bottom:4px}
.slots-row.mirrored{flex-direction:row-reverse}
.slots-row::-webkit-scrollbar{display:none}
.zgroup{display:inline-grid;grid-template-columns:140px 140px;grid-template-rows:80px 80px;gap:3px;flex-shrink:0;align-self:flex-start;border-radius:12px;overflow:hidden;height:163px;}
.zgroup.drawers{grid-template-columns:140px 140px;grid-template-rows:80px 80px;gap:3px;height:163px}

.slot{
  width:140px;height:160px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;
  font-family:'IBM Plex Mono';font-size:11px;font-weight:700;cursor:pointer;position:relative;
  border:2px solid transparent;flex-shrink:0;transition:all .1s;gap:3px;padding:6px 5px;box-shadow:var(--shadow);
}
.slot:hover{transform:scale(1.05) translateY(-2px);z-index:40;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.slot.dim{opacity:.1}
.slot.UNUSED{opacity:.28;filter:grayscale(.6)}
.slot.IN::after{content:"";position:absolute;top:6px;right:6px;width:9px;height:9px;border-radius:50%;background:#10b981;box-shadow:0 0 0 2px rgba(16,185,129,.25)}
.slot.EMPTY::after{content:"";position:absolute;top:6px;right:6px;width:9px;height:9px;border-radius:50%;background:#e2e8f0;border:1.5px solid #94a3b8}

.slot.반박스{background:#6366f1;border-color:#4f46e5;color:#fff}
.slot.풀박스{background:#9333ea;border-color:#7c3aed;color:#fff;width:283px;height:160px}
.slot.흰색{background:#64748b;border-color:#475569;color:#fff;width:140px;height:100%}
.slot.노란색{background:#f59e0b;border-color:#d97706;color:#fff;width:140px;height:100%}
.slot.초소형{background:#0891b2;border-color:#0e7490;color:#fff;width:90px}
.slot.서랍{background:#db2777;border-color:#be185d;color:#fff;width:140px;height:100%}
.slot.unknown{background:#e8e4de;border-color:#c8c0b6;color:#5a534d}
.slot.has-item{width:140px!important;min-width:140px!important;max-width:140px!important;}

/* ✅ 풀박스는 품목이 있어도 원래 사이즈 유지 */
.slot.풀박스.has-item{
  width:283px!important;
  min-width:283px!important;
  max-width:283px!important;
}
.slot-id{font-size:13px;line-height:1;font-weight:600;letter-spacing:.3px;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.3)}
.slot-order{font-size:10px;line-height:1;color:rgba(255,255,255,.75);text-shadow:0 1px 2px rgba(0,0,0,.3)}
.slot-item{
  font-size:11px;font-weight:800;line-height:1.3;
  text-align:center;word-break:break-all;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;letter-spacing:.2px;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.35);
  width:100%;max-width:100%;
}
.slot-material{font-size:13px;font-weight:700;opacity:.9;line-height:1;color:rgba(255,255,255,.9);text-shadow:0 1px 2px rgba(0,0,0,.3)}
.slot-loc{font-size:8px;opacity:.55;line-height:1}


/* ── 소재별 슬롯 색상 ── */
.slot.mat-CN10{background:#ca8a04!important;border-color:#a16207!important;color:#fff!important}
.slot.mat-CN20{background:#374151!important;border-color:#1f2937!important;color:#fff!important}
.slot.mat-RS40{background:#0d9488!important;border-color:#0f766e!important;color:#fff!important}
.slot.mat-RS20{background:#6b7280!important;border-color:#4b5563!important;color:#fff!important}
.slot.mat-CM20{background:#a07850!important;border-color:#7c5e3a!important;color:#fff!important}

/* ── 소재 범례 ── */
.material-legend{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);
}
.mat-chip{
  display:flex;align-items:center;gap:5px;
  font-family:'IBM Plex Mono';font-size:11px;color:var(--text);
}
.mat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* has-item override */
.slot.has-item{width:auto!important;min-width:56px;max-width:100px;}

/* ── 슬롯 상세 바텀시트 ── */
.sheet-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
}
.sheet-backdrop.on{display:block}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:var(--bg);border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.12);
  padding:0 0 calc(20px + var(--safe-bottom));
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:90vh;overflow-y:auto;
}
.sheet.on{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-family:'IBM Plex Mono';font-size:15px;font-weight:700;color:var(--accent);padding:0 20px;margin-bottom:14px}
.sheet-field{padding:11px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.sheet-label{font-size:12px;color:var(--muted);flex-shrink:0;width:60px}
.sheet-value{font-size:13px;color:var(--text);text-align:right;flex:1}
.sheet-input,.sheet-select{
  flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:8px 10px;font-size:13px;outline:none;
  font-family:'Pretendard','IBM Plex Sans KR',sans-serif;text-align:right;
}
.sheet-input:focus,.sheet-select:focus{border-color:var(--accent)}
.sheet-actions{display:flex;gap:10px;padding:16px 20px 4px}
.sheet-btn{
  flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;
  border:none;cursor:pointer;font-family:'IBM Plex Sans KR';
}
.sheet-btn.cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.sheet-btn.save{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(217,119,6,.3)}
.sheet-btn.queue{background:#6366f1;color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}

/* ── 인쇄 대기열 ── */
.pq-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.pq-toolbar-title{font-family:'IBM Plex Mono';font-size:14px;font-weight:700;color:var(--accent)}
.pq-count{font-size:12px;color:var(--muted)}
.pq-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text);font-family:inherit;box-shadow:var(--shadow);
}
.pq-btn.print{background:var(--accent);color:#fff;border:none;font-weight:700;box-shadow:0 2px 8px rgba(217,119,6,.3)}
.pq-btn.clear{color:#dc2626;border-color:#fecaca}
.pq-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.pq-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start}
.pq-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;width:calc(50% - 4px);box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:4px;position:relative;
}
.pq-card-loc{font-family:'IBM Plex Mono';font-size:15px;font-weight:800;color:var(--accent)}
.pq-card-item{font-size:13px;font-weight:700;color:var(--text);word-break:break-all}
.pq-card-mat{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;color:#fff;width:fit-content}
.pq-card-del{
  position:absolute;top:6px;right:8px;background:none;border:none;
  font-size:16px;cursor:pointer;color:var(--muted);padding:2px 6px;
}
.pq-card-del:hover{color:#dc2626}
/* 대기열 인쇄 라벨 (화면+인쇄 공통) */
.pq-print-area{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
.pq-print-area .pq-label{
  display:flex;align-items:stretch;
  border:1.5px solid #555;border-radius:3px;
  margin:1mm;page-break-inside:avoid;
  width:112mm;min-width:112mm;max-width:112mm;height:28mm;overflow:hidden;background:#fff;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;
}
/* 1: 위치 정사각형 */
.pq-print-area .pq-label-loc{
  width:28mm;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:#f5f3f0;border-right:1px solid #ddd;
  font-family:Consolas,'Courier New',monospace;font-size:16pt;font-weight:900;
  color:#111;letter-spacing:0.5px;
}
/* 2: QR 정사각형 */
.pq-print-area .pq-label-qr{
  width:28mm;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:2mm;border-right:1px solid #ddd;background:#fff;
}
.pq-print-area .pq-label-qr img,.pq-print-area .pq-label-qr canvas{width:22mm!important;height:22mm!important}
/* 3: 치수+소재 (50mm 고정) */
.pq-print-area .pq-label-info{
  width:50mm;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;
  padding:2mm 4mm;
}
.pq-print-area .pq-label-item{
  font-family:Consolas,'Courier New',monospace;font-size:16pt;font-weight:900;
  color:#111;white-space:nowrap;line-height:1.2;
}
.pq-print-area .pq-label-mat{
  font-family:Consolas,monospace;font-size:13pt;font-weight:800;
  color:#555;margin-top:1.5mm;
}
/* 오른쪽 끝: 소재 색상 바 */
.pq-print-area .pq-label-cb{
  width:6mm;flex-shrink:0;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;
}

/* ── 인쇄 탭 모드전환 ── */
.pq-tabs{display:flex;gap:4px;margin-bottom:12px}
.pq-tab{
  flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;color:var(--muted);
}
.pq-tab.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(217,119,6,.3)}
.pq-select{
  font-family:inherit;font-size:12px;padding:7px 12px;
  border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;color:var(--text);
}
.pq-so{display:flex;gap:3px}
.pq-sz{font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--surface)}
.pq-sz input{display:none}
.pq-sz input:checked+span{color:var(--accent);font-weight:700}

/* ── 공지 토스트 ── */
.toast{

}
@keyframes toastout{0%{opacity:1;transform:translateX(-50%) translateY(0)}

  100%{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* ── 검색 결과 패널 ── */

.result-status.IN{background:rgba(16,185,129,.15);color:#059669;font-weight:700}
.result-status.EMPTY{background:rgba(148,163,184,.15);color:#64748b}
.result-status.UNUSED{background:rgba(0,0,0,.06);color:#94a3b8}

}

/* ── 빈슬롯 추천 모드 ── */

}
@keyframes recommend-pulse{

  content:"★";position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  font-size:11px;color:#10b981;background:#fff;border-radius:50%;
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.15);line-height:16px;text-align:center;

/* ── 추천 패널 ── */

}

/* ── 스프레드시트 뷰 ── */
#panel-table{overflow:auto;}
.table-toolbar{
  display:flex;align-items:center;gap:8px;padding:12px 16px 8px;

}

.tbl-checkbox{

}

function parseTSV(tsv){
  const lines = tsv.trim().split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  if(lines.length<=1) return [];
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const line = lines[i];
    let cells = line.includes('\t') ? line.split('\t') : line.split(/\s+/);
    // 기존 TSV 컬럼이 많아도 필요한 값만 사용 (dan/chapter는 무시)
    while(cells.length < 8) cells.push('');
    const [section,floor,_dan,order,_chapter,saved,status,type] = cells.map(x=>(x??'').trim());
    rows.push({
      section: section || '',
      floor: floor ? Number(floor) : null,
      order: order ? Number(order) : null,
      saved: saved ? Number(saved) : 0,
      // migrate: ACTIVE→'' HOLD→UNUSED
      status: status || '',
      type: type || ''
    });
  }
  return rows.filter(r=>r.section && r.floor && r.order);
}

function keyOf(r){
  return `${r.section}|${Number(r.floor)}|${Number(r.order)}`;
}

async function loadFromSheet(){
  showLoading('⏳ 서버에서 불러오는 중...');
  try{
    const res=await fetch(API_URL+'?action=getAll');
    const json=await res.json();

    // baseRows를 loc 기준으로 인덱싱 (type 등 레이아웃 정보 참조용)
    const baseByLoc=new Map(baseRows.map(r=>[`${r.section}|${r.floor}|${r.order}`,r]));

    if(json.data && json.data.length>0){
      // ★ 핵심: 구글시트 행만 data로 구성 (시트에 없으면 표시 안 함)
      data = json.data.map((s, idx)=>{
        const loc=`${s.section}|${s.floor}|${s.order}`;
        const base=baseByLoc.get(loc); // HTML 레이아웃 참조
        return {
          id: idx,
          key: keyOf(s),
          section: s.section||'',
          floor: Number(s.floor)||1,
          order: Number(s.order)||1,
          type: s.type||base?.type||'반박스',
          status: s.status==='HOLD'?'UNUSED':s.status==='ACTIVE'?'':s.status||'',
          item: s.item!=null?String(s.item).trim():'',
          material: s.material!=null?String(s.material).trim():'',
          qty: s.qty!=null&&s.qty!==''?s.qty:'',
          inDate: s.inDate||'',
          memo: s.memo!=null?String(s.memo).trim():'',
          saved: s.saved!=null&&s.saved!==''?Number(s.saved):0,
        };
      });
      hideLoading();
      showToast('✅ 서버 데이터 로드 완료 · '+data.length+'개 슬롯');
    } else {
      // 시트가 비어있으면 baseRows 사용 (초기 세팅)
      hideLoading();
      showToast('📋 시트가 비어있어요 · 기본 레이아웃 표시');
      data = baseRows.map((r,idx)=>({
        id:idx, key:keyOf(r),
        section:r.section, floor:r.floor, order:r.order,
        saved:0, status:'', type:r.type??'반박스',
        item:'', material:'', qty:'', inDate:'', memo:''
      }));
    }
    // 캐시 저장
    try{ localStorage.setItem('wh_cache_v1', JSON.stringify(data)); }catch(e){}
    renderAll();
    if(searchQ||emptyOnly||activeMatFilter) renderFilteredResults();
    handleQRParam();
  }catch(err){
    hideLoading();
    showToast('⚠️ 서버 연결 실패 · 캐시 사용');
    loadFromCache();
    renderAll();
  }
}

// localStorage 캐시 (오프라인 대비)
function loadFromCache(){
  try{
    const raw=localStorage.getItem('wh_cache_v1');
    if(!raw)return;
    const arr=JSON.parse(raw);
    // 캐시도 시트 기준: 캐시에 있는 행만 표시
    if(arr && arr.length>0){
      data=arr.map((d,idx)=>({...d,id:idx}));
    }
  }catch(e){}
}

async function persist(slot){
  // 낙관적 업데이트: UI는 즉시 반영
  try{ localStorage.setItem('wh_cache_v1', JSON.stringify(data)); }catch(e){}
  try{
    // ✅ POST 방식 (URL 길이 제한/저장 누락 방지)
    const payload = {
      action: 'save',
      data: {
        key: slot.key,
        section: slot.section,
        floor: slot.floor,
        order: slot.order,
        saved: slot.saved,
        status: slot.status,
        type: slot.type,
        item: slot.item,
        qty: slot.qty,
        inDate: slot.inDate,
        memo: slot.memo,
        material: slot.material
      }
    };
    await fetch(API_URL, {
      method:'POST',
      // ✅ 헤더를 지정하지 않으면 text/plain으로 전송되어 CORS preflight(OPTIONS) 없이 전달됩니다.
      body: JSON.stringify(payload)
    });
  }catch(err){
    showToast('⚠️ 서버 저장 실패 · 로컬에만 저장됨');
  }
}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const arr=JSON.parse(ev.target.result);
      const byKey=new Map(arr.map(x=>[x.key,x]));
      data=data.map(d=>byKey.has(d.key)?({...d,...byKey.get(d.key)}):d);
      // 전체 변경된 슬롯 서버에 올리기
      showToast('⏳ 서버에 업로드 중...');
      fetch(API_URL,{method:'POST',body:JSON.stringify({action:'saveAll',data:data.filter(d=>d.item||d.status||d.saved||d.memo||d.material||d.qty!==''||d.inDate).map(d=>({key:d.key,section:d.section,floor:d.floor,order:d.order,saved:d.saved,status:d.status,type:d.type,item:d.item,qty:d.qty,inDate:d.inDate,memo:d.memo,material:d.material}))})})
        .then(()=>showToast('✅ 서버 업로드 완료'))
        .catch(()=>showToast('⚠️ 서버 업로드 실패'));
      try{localStorage.setItem('wh_cache_v1',JSON.stringify(data));}catch(e){}
      renderAll();
    }catch(err){alert('파일 형식 오류: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}

function renderSearchResults(){
  const panel=document.getElementById('searchResultPanel');
  const list=document.getElementById('searchResultList');
  const header=document.getElementById('searchResultHeader');
  list.innerHTML='';

  // 매칭 슬롯: 섹션명 OR 품목코드 OR 메모
  const matches=data.filter(d=>
    d.section.toUpperCase().includes(searchQ)||
    (d.item||'').toUpperCase().includes(searchQ)||
    (d.material||'').toUpperCase().includes(searchQ)||
    (d.memo||'').toUpperCase().includes(searchQ)
  );

  // 품목코드 정확 매칭 우선 정렬
  matches.sort((a,b)=>{
    const aExact=(a.item||'').toUpperCase()===searchQ;
    const bExact=(b.item||'').toUpperCase()===searchQ;
    if(aExact&&!bExact)return -1;
    if(!aExact&&bExact)return 1;
    // 그 다음 품목 있는것 우선
    const aHas=!!(a.item);
    const bHas=!!(b.item);
    if(aHas&&!bHas)return -1;
    if(!aHas&&bHas)return 1;
    return a.section.localeCompare(b.section)||(a.floor-b.floor)||(a.order-b.order);
  });

  // 품목코드로 검색한 경우 (섹션 단독 검색 아닐때) 품목없는 슬롯은 제외
  const isItemSearch=!('ABCDEFGHIJKLMNOP'.includes(searchQ)&&searchQ.length===1);
  const filtered=isItemSearch
    ? matches.filter(d=>(d.item||'').toUpperCase().includes(searchQ)||(d.memo||'').toUpperCase().includes(searchQ))
    : matches;

  header.innerHTML=filtered.length>0
    ? `<b>"${document.getElementById('searchInput').value}"</b> 검색결과 · <b style="color:var(--text)">${filtered.length}개</b> 슬롯`
    : `<b>"${document.getElementById('searchInput').value}"</b> 검색결과`;

  if(filtered.length===0){
    // 혹시 data에 item이 하나라도 있는지 확인
    const hasAnyItem = data.some(d=>d.item);
    list.innerHTML=`<div class="no-results">
      <div>🔍</div>
      <b style="color:var(--text)">"${document.getElementById('searchInput').value}"</b> 검색 결과 없음
      <br><span style="font-size:12px;margin-top:8px;display:block;color:var(--muted)">
        ${hasAnyItem ? '등록된 품목 중 일치하는 항목이 없어요' : '아직 품목코드가 등록된 슬롯이 없어요.<br>슬롯을 탭해서 품목코드를 입력해주세요'}
      </span>
    </div>`;
    return;
  }

  // 섹션별 그룹핑 표시
  const bySection={};
  filtered.forEach(d=>{
    if(!bySection[d.section])bySection[d.section]=[];
    bySection[d.section].push(d);
  });

  Object.entries(bySection).sort(([a],[b])=>a.localeCompare(b)).forEach(([sec,items])=>{

      // 클릭시 해당 섹션 상세로 이동 + 슬롯 편집시트 오픈
      card.addEventListener('click',()=>{
        closeSearchResults();
        document.getElementById('searchInput').value='';
        searchQ='';
        document.getElementById('searchClear').style.display='none';
        // 섹션 상세 열기
        setTimeout(()=>{
          openSection(d.section);
          // 약간 딜레이 후 해당 슬롯 시트 열기
          setTimeout(()=>openSheet(d.id), 300);
        }, 50);
      });

      list.appendChild(card);
    });
  });
}


/* ── 상태 헬퍼 ── */
function getSlotState(d){
  if(d.item) return 'IN';
  if(d.status==='UNUSED') return 'UNUSED';
  return 'EMPTY';
}

function matchesFilter(d){
  if(currentFilter==='all')return true;
  if(currentFilter==='IN')return getSlotState(d)==='IN';
  if(currentFilter==='EMPTY')return getSlotState(d)==='EMPTY';
  if(currentFilter==='UNUSED')return getSlotState(d)==='UNUSED';
  return true;
}
function matchesSearch(d){
  if(!searchQ)return true;
  return d.section.toUpperCase().includes(searchQ)||(d.item||'').toUpperCase().includes(searchQ);
}

/* ── 통계 ── */
function renderStats(){
  const total=data.length;
  const inCnt=data.filter(d=>getSlotState(d)==='IN').length;
  const emptyCnt=data.filter(d=>getSlotState(d)==='EMPTY').length;
  const unusedCnt=data.filter(d=>getSlotState(d)==='UNUSED').length;
  document.getElementById('statsRow').innerHTML=[
    ['#38bdf8','전체',total],
    ['#10b981','🟢 입고',inCnt],
    ['#94a3b8','⬜ 공실',emptyCnt],
    ['#d1d5db','🔴 미사용',unusedCnt],
  ].map(([c,l,v])=>`<div class="stat-chip"><span class="sdot" style="background:${c}"></span>${l}<b>${v}</b></div>`).join('');
}

/* ── 조감도 ── */
function renderOverview(){
  renderStats();
  const grid=document.getElementById('overviewGrid');
  grid.innerHTML='';
  const sections=[...new Set(data.map(d=>d.section))].sort();
  const filtered=sections.filter(sec=>{
    if(searchQ&&!sec.toUpperCase().includes(searchQ)){
      if(!data.some(d=>d.section===sec&&matchesSearch(d)))return false;
    }
    return true;
  });

  for(let i=0;i<filtered.length;i+=2){
    const secA=filtered[i],secB=filtered[i+1];
    const block=document.createElement('div');
    block.className='aisle-block';
    const aisleN=Math.floor(i/2)+1;
    block.innerHTML=`<div class="aisle-label">통로 ${aisleN}</div>`;
    const secGrid=document.createElement('div');
    secGrid.className='aisle-sections';

    [secA,secB].forEach(sec=>{
      if(!sec){secGrid.appendChild(document.createElement('div'));return;}
      const sd=data.filter(d=>d.section===sec);
      const floors=[...new Set(sd.map(d=>d.floor))].sort((a,b)=>b-a);
      const even=isEven(sec);
      const act=sd.filter(d=>getSlotState(d)==='IN').length;
      const hld=sd.filter(d=>getSlotState(d)==='EMPTY').length;
      const none=sd.filter(d=>getSlotState(d)==='UNUSED').length;

      const box=document.createElement('div');
      box.className='ov-sec'+(even?' mirror':'');

      let barsHTML='';
      floors.forEach(fl=>{
        const fd=sd.filter(d=>d.floor===fl);
        const fT=fd.length,fA=fd.filter(d=>getSlotState(d)==='IN').length,
          fH=fd.filter(d=>getSlotState(d)==='EMPTY').length,fN=fd.filter(d=>getSlotState(d)==='UNUSED').length;
        const pA=fT?(fA/fT*100):0,pH=fT?(fH/fT*100):0,pN=fT?(fN/fT*100):0;
        const dir=even?'row-reverse':'row';
        barsHTML+=`<div class="ov-fbar">
          <div class="ov-fbar-lbl">${fl}F</div>
          <div class="ov-fbar-track" style="flex-direction:${dir}">
            <div class="ov-fbar-active" style="width:${pA}%"></div>
            <div class="ov-fbar-hold" style="width:${pH}%"></div>
            <div class="ov-fbar-none" style="width:${pN}%"></div>
          </div>
          <div class="ov-fbar-cnt">${fT}</div>
        </div>`;
      });

      box.innerHTML=`
        <div class="ov-sec-name">섹션 ${sec}</div>
        <div class="ov-chips">
          ${act>0?`<span class="ov-chip in">🟢${act}</span>`:''}
          ${hld>0?`<span class="ov-chip empty">⬜${hld}</span>`:''}
          ${none>0?`<span class="ov-chip unused">🔴${none}</span>`:''}
        </div>
        <div class="ov-floor-bars">${barsHTML}</div>`;

      box.addEventListener('click',()=>openSection(sec));
      secGrid.appendChild(box);
    });

    block.appendChild(secGrid);
    grid.appendChild(block);
  }
}

/* ── 섹션 상세 ── */
function renderDetail(sec){
  const content=document.getElementById('detailContent');
  content.innerHTML='';
  const even=isEven(sec);
  const sd=data.filter(d=>d.section===sec);
  const floors=[...new Set(sd.map(d=>d.floor))].sort((a,b)=>b-a);

  // 섹션 통계
  const act=sd.filter(d=>d.status==='ACTIVE').length;
  const hld=sd.filter(d=>d.status==='HOLD').length;
  const sv=sd.filter(d=>d.saved==1).length;
  const ns=sd.filter(d=>!d.status).length;
  // 소재 범례
  const legend=document.createElement('div');
  legend.className='material-legend';
  const MATS=[
    ['CN10','#ca8a04','노란색'],['CN20','#374151','검은색'],
    ['RS40','#0d9488','청록색'],['RS20','#6b7280','회색'],['CM20','#a07850','베이지']
  ];
  legend.innerHTML=MATS.map(([name,color,label])=>
    `<div class="mat-chip"><div class="mat-dot" style="background:${color}"></div>${name}<span style="color:var(--muted);font-size:10px">(${label})</span></div>`
  ).join('');
  content.appendChild(legend);

  const statEl=document.createElement('div');
  statEl.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px';
  statEl.innerHTML=`
    <div class="stat-chip"><span class="sdot" style="background:#38bdf8"></span>전체<b>${sd.length}</b></div>
    <div class="stat-chip"><span class="sdot" style="background:#34d399"></span>ACTIVE<b>${act}</b></div>
    <div class="stat-chip"><span class="sdot" style="background:#fbbf24"></span>HOLD<b>${hld}</b></div>
    ${sv>0?`<div class="stat-chip"><span class="sdot" style="background:#34d399"></span>저장됨<b>${sv}</b></div>`:''}
    ${ns>0?`<div class="stat-chip"><span class="sdot" style="background:#536080"></span>미지정<b>${ns}</b></div>`:''}
  `;
  content.appendChild(statEl);

  // Q, R 섹션: 2컬럼 레이아웃 (1~4층 왼쪽, 5~8층 오른쪽)
  const isSplit = (sec==='Q'||sec==='R');
  if(isSplit){
    // 모든 슬롯을 order 순으로 가져와서 4개씩 행으로 나눔
    const allSlots = sd.sort((a,b)=>a.order-b.order);
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;gap:6px';

    for(let i=0;i<allSlots.length;i+=4){
      const rowSlots = allSlots.slice(i,i+4);
      const row = document.createElement('div');
      row.style.cssText='display:flex;gap:6px;flex-wrap:nowrap';
      rowSlots.forEach(d=>row.appendChild(makeSlotEl(d)));
      wrap.appendChild(row);
      // 4개 단위마다 구분선
      if(i+4<allSlots.length){
        const sep=document.createElement('div');
        sep.style.cssText='height:1px;background:#e2e8f0;margin:2px 0';
        wrap.appendChild(sep);
      }
    }
    content.appendChild(wrap);
  } else {

  floors.forEach(floor=>{
    const fd=sd.filter(d=>d.floor===floor).sort((a,b)=>a.order-b.order);
    const fb=document.createElement('div');
    fb.className='floor-block';
    const fhd=document.createElement('div');
    fhd.className='floor-hd';
    fhd.textContent=floor+'층';
    fb.appendChild(fhd);

    const row=document.createElement('div');
    row.className='slots-row'+(even?' mirrored':'');

    const isGroupType=t=>t==='흰색'||t==='노란색'||t==='서랍';
    let i=0;
    while(i<fd.length){
      const d=fd[i];
      if(isGroupType(d.type)){
        const group=[];
        let j=i;
        while(j<fd.length&&fd[j].type===d.type&&group.length<4){group.push(fd[j]);j++;}
        const isDrawer=d.type==='서랍';
        const cellW=isDrawer?36:24;
        const zg=document.createElement('div');
        zg.className='zgroup'+(isDrawer?' drawers':'');

        let arranged;
        if(even){arranged=[group[1]||null,group[0]||null,group[3]||null,group[2]||null];}
        else{arranged=[group[0]||null,group[1]||null,group[2]||null,group[3]||null];}

        arranged.forEach(gd=>{
          if(gd){zg.appendChild(makeSlotEl(gd));}
          else{const em=document.createElement('div');em.style.cssText=`width:${cellW}px;height:80px;`;zg.appendChild(em);}
        });
        row.appendChild(zg);i=j;
      }else{
        row.appendChild(makeSlotEl(d));i++;
      }
    }
    fb.appendChild(row);
    content.appendChild(fb);
  });
  } // end isTwoCol else
}

function makeSlotEl(d){
  const slot=document.createElement('div');
  const tc=d.type||'unknown';
  const state=getSlotState(d);
  let cls=`slot ${tc} ${state}`;
  if(d.material)cls+=` mat-${d.material}`;
  cls+=' has-item'; // 항상 동일 크기 유지
  slot.className=cls;

  const slotId=`${d.section}${d.floor}-${d.order}`;
  let inner=`<span class="slot-id">${slotId}</span>`;
  if(d.item) inner+=`<span class="slot-item">${d.item}</span>`;
  if(d.material) inner+=`<span class="slot-material">${d.material}</span>`;
  if(!d.item&&!d.material){
    if(state==='UNUSED') inner+=`<span style="font-size:10px;opacity:.4">미사용</span>`;
    else inner+=`<span style="font-size:9px;opacity:.3">#${d.order}</span>`;
  }
  slot.innerHTML=inner;
  slot.setAttribute('data-id', d.id);
  slot.addEventListener('click',e=>{e.stopPropagation();openSheet(d.id);});
  return slot;
}

/* ── 바텀시트 ── */
let editingId=null;
function openSheet(id){
  editingId=id;
  const d=data[id];
  // ✅ 추가: 전체뷰/검색에서 바로 열어도 currentSection이 null이 되지 않게
  currentSection = d.section;
  document.getElementById('sheetLoc').textContent=`${d.section}${d.floor}-${d.order}`;
  document.getElementById('sheetType').value=d.type||'';
  document.getElementById('sheetStatus').value=d.status==='UNUSED'?'UNUSED':'EMPTY';
  document.getElementById('sheetSaved').value=String(d.saved??0);
  document.getElementById('sheetItem').value=d.item||'';
  document.getElementById('sheetMaterial').value=d.material||'';
  document.getElementById('sheetMaterial').value=d.material||'';
  document.getElementById('sheetQty').value=d.qty??'';
  document.getElementById('sheetInDate').value=d.inDate||'';
  document.getElementById('sheetMemo').value=d.memo||'';
  document.getElementById('sheetBackdrop').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}
function closeSheet(){
  document.getElementById('sheetBackdrop').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
  editingId=null;
}
function saveSheet(){
  if(editingId===null)return;
  const d=data[editingId];
  d.type=document.getElementById('sheetType').value;
  const newStatus=document.getElementById('sheetStatus').value;
  // C안: item 있으면 UNUSED 자동 해제
  d.status=d.item?'':newStatus==='UNUSED'?'UNUSED':'';
  if(d.item && d.status==='UNUSED') d.status='';
  d.saved=Number(document.getElementById('sheetSaved').value);
  d.item=document.getElementById('sheetItem').value.trim();
  d.material=document.getElementById('sheetMaterial').value.trim();
  const qv=document.getElementById('sheetQty').value;
  d.qty=qv===''?'':Number(qv);
  d.inDate=document.getElementById('sheetInDate').value;
  d.memo=document.getElementById('sheetMemo').value.trim();
  closeSheet();
  // ✅ 안전장치: 섹션이 없으면 전체 리렌더
  if(currentSection) renderDetail(currentSection);
  else renderAll();
  renderStats();
  // 검색 중이면 결과도 갱신
  if(searchQ) renderSearchResults();
  showToast('⏳ 서버에 저장 중...');
  persist(d).then(()=>showToast('✅ 서버에 저장됨'));
}

/* ── 전체뷰 렌더링 ── */
function renderFullView(){
  const wrap=document.getElementById('fullWarehouse');
  wrap.innerHTML='';
  const sections=[...new Set(data.map(d=>d.section))].sort();

  function makeSecBlock(sec){
    const even=isEven(sec);
    const sd=data.filter(d=>d.section===sec);
    const floors=[...new Set(sd.map(d=>d.floor))].sort((a,b)=>b-a);
    const act=sd.filter(d=>getSlotState(d)==='IN').length;
    const hld=sd.filter(d=>getSlotState(d)==='EMPTY').length;

    const secDiv=document.createElement('div');
    secDiv.className='full-section';

    const hd=document.createElement('div');
    hd.className='full-sec-hd';
    hd.innerHTML=`섹션 ${sec}
      <span style="background:rgba(5,150,105,.12);color:#065f46;padding:1px 6px;border-radius:6px;font-size:9px">✅ ${act}</span>
      ${hld?`<span style="background:rgba(217,119,6,.12);color:#92400e;padding:1px 6px;border-radius:6px;font-size:9px">⏸ ${hld}</span>`:''}`;
    secDiv.appendChild(hd);

    // Q, R 섹션: 2개씩 줄바꿈 (층 레이블 없음)
    if(sec==='Q'||sec==='R'){
      const allSlots=sd.sort((a,b)=>a.order-b.order);
      const gridWrap=document.createElement('div');
      gridWrap.style.cssText='display:flex;flex-direction:column;gap:4px;padding:4px 0';
      for(let i=0;i<allSlots.length;i+=2){
        const rowEl=document.createElement('div');
        rowEl.style.cssText='display:flex;gap:4px';
        allSlots.slice(i,i+2).forEach(d=>rowEl.appendChild(makeSlotEl(d)));
        gridWrap.appendChild(rowEl);
      }
      secDiv.appendChild(gridWrap);
    } else {
    floors.forEach(floor=>{
      const fd=sd.filter(d=>d.floor===floor).sort((a,b)=>a.order-b.order);
      const floorRow=document.createElement('div');
      floorRow.className='full-floor-row';
      const lbl=document.createElement('div');
      lbl.className='full-floor-lbl';
      lbl.textContent=floor+'F';
      floorRow.appendChild(lbl);
      const slotsWrap=document.createElement('div');
      slotsWrap.className='full-slots'+(even?' mirrored':'');
      const isGroupType=t=>t==='흰색'||t==='노란색'||t==='서랍';
      let i=0;
      while(i<fd.length){
        const d=fd[i];
        if(isGroupType(d.type)){
          const group=[];let j=i;
          while(j<fd.length&&fd[j].type===d.type&&group.length<4){group.push(fd[j]);j++;}
          const isDrawer=d.type==='서랍';
          const cellW=isDrawer?80:54;
          const zg=document.createElement('div');
          zg.className='zgroup'+(isDrawer?' drawers':'');
          let arranged;
          if(even){arranged=[group[1]||null,group[0]||null,group[3]||null,group[2]||null];}
          else{arranged=[group[0]||null,group[1]||null,group[2]||null,group[3]||null];}
          arranged.forEach(gd=>{
            if(gd){zg.appendChild(makeSlotEl(gd));}
            else{const em=document.createElement('div');em.style.cssText=`width:${cellW}px;height:80px;`;zg.appendChild(em);}
          });
          slotsWrap.appendChild(zg);i=j;
        }else{
          slotsWrap.appendChild(makeSlotEl(d));i++;
        }
      }
      floorRow.appendChild(slotsWrap);
      secDiv.appendChild(floorRow);
    });
    } // end Q/R else
    return secDiv;
  }

  // 실제 물리 배치:
  // [S(90°)] [Q] [A]
  //          통로1
  //          [R] [B]
  //              통로2
  //              [C] ...

  const secSet = new Set(sections);
  const specialSet = new Set(['Q','R','S']);
  const mainSecs = sections.filter(s=>!specialSet.has(s));

  function mkAisle(num){
    const d=document.createElement('div');
    d.className='full-aisle-label';
    d.textContent=`통로 ${num}`;
    return d;
  }
  function mkGap(){
    const d=document.createElement('div');
    d.style.cssText='height:8px;border-top:1px dashed var(--border);margin:4px 0';
    return d;
  }

  // ── 메인 컬럼 (A, B, C...) ──
  const mainCol = document.createElement('div');
  mainCol.style.cssText='display:flex;flex-direction:column;gap:0;flex:1';
  for(let i=0;i<mainSecs.length;i+=2){
    if(i>0) mainCol.appendChild(mkGap());
    mainCol.appendChild(makeSecBlock(mainSecs[i]));
    mainCol.appendChild(mkAisle(Math.floor(i/2)+1));
    if(mainSecs[i+1]) mainCol.appendChild(makeSecBlock(mainSecs[i+1]));
  }

  // ── QR 컬럼: Q는 A에 딱붙고, 통로, R은 B에 딱붙음 ──
  const qrCol = document.createElement('div');
  qrCol.style.cssText='display:flex;flex-direction:column;gap:0;flex-shrink:0';

  function makeSecBlockInline(sec){
    // 카드 박스 없이 슬롯만 — Q/R용
    const div = document.createElement('div');
    div.style.cssText='display:flex;flex-direction:column;gap:4px;padding:10px 0';
    const hd = document.createElement('div');
    hd.className='full-sec-hd';
    const sd2 = data.filter(d=>d.section===sec);
    const act2 = sd2.filter(d=>getSlotState(d)==='IN').length;
    hd.innerHTML=`섹션 ${sec} <span style="background:rgba(5,150,105,.12);color:#065f46;padding:1px 6px;border-radius:6px;font-size:9px">✅ ${act2}</span>`;
    div.appendChild(hd);
    const allSlots=sd2.sort((a,b)=>a.order-b.order);
    for(let i=0;i<allSlots.length;i+=2){
      const row=document.createElement('div');
      row.style.cssText='display:flex;gap:4px';
      allSlots.slice(i,i+2).forEach(d=>row.appendChild(makeSlotEl(d)));
      div.appendChild(row);
    }
    return div;
  }

  if(secSet.has('Q')) qrCol.appendChild(makeSecBlockInline('Q'));
  qrCol.appendChild(mkAisle(''));
  if(secSet.has('R')) qrCol.appendChild(makeSecBlockInline('R'));

  // ── S 컬럼: 일반 섹션과 동일하게 층별 렌더 ──
  const sCol = document.createElement('div');
  sCol.style.cssText='display:flex;flex-direction:column;flex-shrink:0;gap:0';

  if(secSet.has('S')){
    sCol.appendChild(makeSecBlock('S'));
  }

  // ── 전체: [S] [QR] [메인] ──
  const outerRow = document.createElement('div');
  outerRow.style.cssText='display:flex;gap:8px;align-items:flex-start';
  outerRow.appendChild(sCol);
  outerRow.appendChild(qrCol);
  outerRow.appendChild(mainCol);
  wrap.appendChild(outerRow);
}


/* ══════════════════════════════════
   검색 필터 (소재 / 빈슬롯)
══════════════════════════════════ */
let activeMatFilter = null;  // 'CN10','CN20'... or 'none'
let emptyOnly = false;

function toggleEmptyFilter(btn){
  emptyOnly = !emptyOnly;
  btn.classList.toggle('on', emptyOnly);
  // 검색 필터바 열기
  document.getElementById('searchFilterBar').classList.add('on');
  triggerFilterSearch();
}

function toggleMatFilter(mat, btn){
  if(activeMatFilter === mat){
    activeMatFilter = null;
    btn.classList.remove('on');
  } else {
    activeMatFilter = mat;
    document.querySelectorAll('.sf-chip:not(.empty-only)').forEach(c=>c.classList.remove('on'));
    btn.classList.add('on');
  }
  triggerFilterSearch();
}

function triggerFilterSearch(){
  // 필터 적용된 상태로 검색결과 패널 열기
  const q = document.getElementById('searchInput').value.trim();
  searchQ = q.toUpperCase();
  renderFilteredResults();
  const panel = document.getElementById('searchResultPanel');
  const tbH = document.querySelector('.topbar').getBoundingClientRect().bottom;
  panel.style.top = tbH + 'px';
  panel.classList.add('on');
}

function renderFilteredResults(){
  const list = document.getElementById('searchResultList');
  const header = document.getElementById('searchResultHeader');
  list.innerHTML = '';

  let matches = data.filter(d => {
    // 텍스트 검색
    const textMatch = !searchQ ||
      d.section.toUpperCase().includes(searchQ) ||
      (d.item||'').toUpperCase().includes(searchQ) ||
      (d.material||'').toUpperCase().includes(searchQ) ||
      (d.memo||'').toUpperCase().includes(searchQ);
    // 빈 슬롯 필터
    const emptyMatch = !emptyOnly || getSlotState(d)==='EMPTY';
    // 소재 필터
    const matMatch = !activeMatFilter ||
      (activeMatFilter === 'none' ? !d.material : (d.material||'').toUpperCase() === activeMatFilter.toUpperCase());
    return textMatch && emptyMatch && matMatch;
  });

  // 정렬: 빈슬롯 모드면 섹션순, 아니면 기존
  if(emptyOnly){
    matches.sort((a,b) => a.section.localeCompare(b.section) || a.floor-b.floor || a.order-b.order);
  } else {
    matches.sort((a,b) => {
      const aEx = (a.item||'').toUpperCase() === searchQ;
      const bEx = (b.item||'').toUpperCase() === searchQ;
      if(aEx && !bEx) return -1;
      if(!aEx && bEx) return 1;
      return !!(b.item) - !!(a.item);
    });
  }

  // 필터 설명
  let filterDesc = '';
  if(emptyOnly) filterDesc += ' · 빈 슬롯만';
  if(activeMatFilter) filterDesc += ` · ${activeMatFilter}`;
  header.innerHTML = `<b style="color:var(--text)">${matches.length}개</b> 결과${filterDesc}`;

  if(matches.length === 0){
    list.innerHTML = `<div class="no-results"><div style="font-size:32px;margin-bottom:12px">🔍</div>조건에 맞는 슬롯이 없어요</div>`;
    return;
  }

  matches.forEach(d => {
    const card = document.createElement('div');
    card.className = 'result-card';
    const slotId = `${d.section}${d.floor}-${d.order}`;
    const matColor = {'CN10':'#ca8a04','CN20':'#374151','RS40':'#0d9488','RS20':'#6b7280','CM20':'#a07850'}[d.material] || null;
    const isEmpty = !d.item && !d.qty;
    card.innerHTML = `
      <div class="result-loc">
        <div class="result-path">${slotId}</div>
        ${isEmpty
          ? `<div style="font-size:12px;color:#10b981;font-weight:600">⬜ 비어있음</div>`
          : `<div class="result-item">📦 ${d.item||'품목없음'}${d.qty!==''&&d.qty!=null?' · '+d.qty+'개':''}</div>`
        }
        <div class="result-meta">
          <span>${d.type||'미지정'}</span>
          ${d.material ? `<span style="background:${matColor}20;color:${matColor};padding:1px 6px;border-radius:6px;font-weight:700">${d.material}</span>` : ''}
          ${d.status ? `<span>${d.status}</span>` : ''}
        </div>
      </div>
      ${d.status ? `<div class="result-status ${d.status}">${d.status}</div>` : ''}
    `;
    card.addEventListener('click', () => {
      closeSearchResults();
      setTimeout(() => { openSection(d.section); setTimeout(() => openSheet(d.id), 200); }, 100);
    });
    list.appendChild(card);
  });
}

let recommendMode = false;
let selectedRecMat = null;

function openRecommend(){
  recommendMode = true;
  selectedRecMat = null;
  document.getElementById('recommendPanel').classList.add('on');

  const tbH = document.querySelector('.topbar').getBoundingClientRect().bottom;

function closeRecommend(){
  recommendMode = false;
  selectedRecMat = null;
  document.getElementById('recommendPanel').classList.remove('on');
  // 하이라이트 제거
  document.querySelectorAll('.slot.recommend,.slot.dim-recommend').forEach(s=>{
    s.classList.remove('recommend','dim-recommend');
  });
}

function renderRecommend(mat){
  selectedRecMat = mat;
  const chips = document.getElementById('recommendChips');
  const recList = document.getElementById('recommendList');
  const subtitle = document.getElementById('recommendSubtitle');

  const MATS = ['CN10','CN20','RS40','RS20','CM20'];
  chips.innerHTML = MATS.map(m =>
    `<div class="rec-chip${mat===m?' on':''}" onclick="renderRecommend('${m}')">${m}</div>`
  ).join('') + `<div class="rec-chip${mat===null?' on':''}" onclick="renderRecommend(null)">전체</div>`;

  // 빈 슬롯 찾기
  const emptySlots = data.filter(d => getSlotState(d)==='EMPTY');

  if(emptySlots.length === 0){
    recList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">빈 슬롯이 없어요</div>';
    subtitle.textContent = '빈 슬롯 없음';
    return;
  }

  // 점수 계산
  const scored = emptySlots.map(slot => {
    let score = 0;
    let reasons = [];

    if(mat){
      // 같은 소재가 같은 섹션에 있는지
      const sameSectionSameMat = data.filter(d =>
        d.section === slot.section && d.material === mat && d.item
      ).length;
      // 같은 층에 같은 소재
      const sameFloorSameMat = data.filter(d =>
        d.section === slot.section && d.floor === slot.floor && d.material === mat && d.item
      ).length;
      // 인접 슬롯에 같은 소재
      const adjacentSameMat = data.filter(d =>
        d.section === slot.section && d.floor === slot.floor &&
        Math.abs(d.order - slot.order) <= 2 && d.material === mat && d.item
      ).length;

      score += sameSectionSameMat * 10;
      score += sameFloorSameMat * 20;
      score += adjacentSameMat * 40;

      if(adjacentSameMat > 0) reasons.push(`바로 옆에 ${mat} 있음`);
      else if(sameFloorSameMat > 0) reasons.push(`같은 층에 ${mat} ${sameFloorSameMat}개`);
      else if(sameSectionSameMat > 0) reasons.push(`같은 섹션에 ${mat} ${sameSectionSameMat}개`);
    }

    // 섹션의 전체 밀집도 (빈 슬롯 비율이 낮을수록 = 잘 안쓰이는 공간 = 낮은 점수)
    const sectionTotal = data.filter(d => d.section === slot.section).length;
    const sectionUsed = data.filter(d => d.section === slot.section && (d.item || d.qty)).length;
    const usageRate = sectionUsed / sectionTotal;
    score += usageRate * 15;

    if(reasons.length === 0){
      if(usageRate > 0.5) reasons.push(`섹션 ${slot.section} 활용률 ${Math.round(usageRate*100)}%`);
      else reasons.push(`섹션 ${slot.section} · ${slot.floor}층 · 빈 슬롯`);
    }

    return { slot, score, reason: reasons[0] || '' };
  });

  scored.sort((a,b) => b.score - a.score);
  const top = scored.slice(0, 8);

  subtitle.textContent = mat
    ? `${mat} 소재 기준 최적 위치 ${top.length}개`
    : `빈 슬롯 ${emptySlots.length}개 중 추천`;

  recList.innerHTML = '';
  top.forEach((item, idx) => {
    const d = item.slot;
    const slotId = `${d.section}${d.floor}-${d.order}`;
    const card = document.createElement('div');
    card.className = 'rec-card';
    card.innerHTML = `
      <div class="rec-rank">${idx+1}</div>
      <div class="rec-info">
        <div class="rec-loc">${slotId} · 섹션${d.section} ${d.floor}층 #${d.order}</div>
        <div class="rec-reason">${item.reason}</div>
      </div>
      <div class="rec-type">${d.type||'미지정'}</div>
    `;
    card.addEventListener('click', () => {
      closeRecommend();
      setTimeout(() => { openSection(d.section); setTimeout(() => openSheet(d.id), 200); }, 100);
    });
    recList.appendChild(card);
  });

  // 전체뷰에서 추천 슬롯 하이라이트 (전체뷰 탭일 때)
  if(currentTab === 'full'){
    const topIds = new Set(top.map(t => t.slot.id));
    document.querySelectorAll('.slot').forEach(el => {
      const idAttr = el.getAttribute('data-id');
      if(!idAttr) return;
      const id = parseInt(idAttr);
      if(topIds.has(id)){ el.classList.add('recommend'); el.classList.remove('dim-recommend'); }
      else { el.classList.add('dim-recommend'); el.classList.remove('recommend'); }
    });
  }
}

let tblSortKey = 'loc';
let tblSortAsc = true;
let selectedIds = new Set();

const MAT_COLORS = {CN10:'#ca8a04',CN20:'#374151',RS40:'#0d9488',RS20:'#6b7280',CM20:'#a07850'};
const STATE_COLORS = {IN:'#059669',EMPTY:'#64748b',UNUSED:'#94a3b8'};

function renderTable(){
  const sorted = [...data].sort((a,b)=>{
    let av, bv;
    const getVal = (d,k)=>{
      if(k==='loc') return `${d.section}${String(d.floor).padStart(2,'0')}-${String(d.order).padStart(3,'0')}`;
      if(k==='state') return getSlotState(d);
      return String(d[k]||'').toLowerCase();
    };
    av=getVal(a,tblSortKey); bv=getVal(b,tblSortKey);
    return tblSortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  const tbody = document.getElementById('whTableBody');
  tbody.innerHTML='';

  sorted.forEach(d=>{
    const state = getSlotState(d);
    const loc = `${d.section}${d.floor}-${d.order}`;
    const matColor = MAT_COLORS[d.material]||null;
    const isSelected = selectedIds.has(d.id);

    const tr = document.createElement('tr');
    if(isSelected) tr.classList.add('selected');
    tr.dataset.id = d.id;

    tr.innerHTML = `
      <td><input type="checkbox" class="tbl-checkbox" ${isSelected?'checked':''} onclick="tblToggleRow(event,${d.id})"></td>
      <td style="font-weight:700;color:var(--accent)">${loc}</td>
      <td>${d.section}</td>
      <td>${d.floor}층</td>
      <td style="font-size:11px">${d.type||'-'}</td>
      <td><span class="tbl-state ${state}">${state==='IN'?'🟢 입고':state==='EMPTY'?'⬜ 공실':'🔴 미사용'}</span></td>
      <td style="font-weight:${d.item?'700':'400'};color:${d.item?'var(--text)':'var(--muted)'}">${d.item||'-'}</td>
      <td>${d.material?`<span class="tbl-mat" style="background:${matColor}">${d.material}</span>`:'-'}</td>
      <td>${d.qty||'-'}</td>
      <td style="font-size:11px;color:var(--muted)">${d.inDate||'-'}</td>
      <td style="font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.memo||''}</td>
    `;

    // 더블클릭 → 해당 섹션으로 이동 후 슬롯 편집창 열기
    tr.addEventListener('dblclick', ()=>{
      switchTab('full');
      setTimeout(()=>{ openSection(d.section); setTimeout(()=>openSheet(d.id),250); },100);
    });

    // 단일클릭 → 체크박스 토글
    tr.addEventListener('click', (e)=>{
      if(e.target.type==='checkbox') return;
      tblToggleRow(e, d.id);
    });

    tbody.appendChild(tr);
  });

  updateSelectedUI();
}

function tblSort(key){
  if(tblSortKey===key) tblSortAsc=!tblSortAsc;
  else { tblSortKey=key; tblSortAsc=true; }
  // 헤더 아이콘 업데이트
  document.querySelectorAll('.wh-table th').forEach(th=>{
    th.classList.remove('sorted');
    const ic=th.querySelector('.sort-icon');
    if(ic) ic.textContent='↕';
  });
  const ths = document.querySelectorAll('.wh-table th');
  const keyMap = ['','loc','section','floor','type','state','item','material','qty','inDate',''];
  const idx = keyMap.indexOf(key);
  if(idx>=0 && ths[idx]){
    ths[idx].classList.add('sorted');
    const ic=ths[idx].querySelector('.sort-icon');
    if(ic) ic.textContent=tblSortAsc?'↑':'↓';
  }
  renderTable();
}

function tblToggleRow(e, id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderTable();
}

function tblToggleAll(chk){
  if(chk.checked){ data.forEach(d=>selectedIds.add(d.id)); }
  else { selectedIds.clear(); }
  renderTable();
}

function tblSelectAll(){ data.forEach(d=>selectedIds.add(d.id)); renderTable(); }
function tblClearSelect(){ selectedIds.clear(); renderTable(); }

function updateSelectedUI(){
  const n = selectedIds.size;
  const cnt = document.getElementById('tblSelectedCount');
  const btn = document.getElementById('pdfBtn');
  cnt.textContent = n+'개 선택됨';
  cnt.classList.toggle('on', n>0);
  btn.disabled = n===0;
  document.getElementById('chkAll').checked = n>0 && n===data.length;
}

/* ── 인쇄 대기열 ── */
const PQ_KEY='wh_print_queue';
function getPrintQueue(){ try{return JSON.parse(localStorage.getItem(PQ_KEY))||[]}catch(e){return[]} }
function savePrintQueue(q){ localStorage.setItem(PQ_KEY,JSON.stringify(q)); updateQueueBadge(); }

function updateQueueBadge(){
  const q=getPrintQueue();
  const badge=document.getElementById('pqBadge');
  if(q.length>0){badge.style.display='inline';badge.textContent=q.length;}
  else{badge.style.display='none';}
}

function addToQueue(){
  if(editingId===null)return;
  const d=data[editingId];
  const loc=`${d.section}${d.floor}-${d.order}`;
  const item=document.getElementById('sheetItem').value.trim();
  const mat=document.getElementById('sheetMaterial').value.trim();
  if(!item && !mat){showToast('품목코드 또는 소재를 입력해주세요');return;}
  const q=getPrintQueue();
  // 중복 체크
  const exists=q.find(x=>x.loc===loc && x.item===item && x.mat===mat);
  if(exists){showToast('이미 대기열에 있습니다');return;}
  q.push({loc,item,mat,ts:Date.now()});
  savePrintQueue(q);
  showToast('🏷 인쇄 대기열에 추가됨 ('+q.length+'개)');
}

function removePQItem(idx){
  const q=getPrintQueue();
  q.splice(idx,1);
  savePrintQueue(q);
  renderPrintQueue();
}

function clearPrintQueue(){
  if(!getPrintQueue().length)return;
  if(!confirm('대기열을 모두 삭제할까요?'))return;
  savePrintQueue([]);
  renderPrintQueue();
}

function renderPrintQueue(){
  const q=getPrintQueue();
  const wrap=document.getElementById('pqList');
  document.getElementById('pqCount').textContent=q.length+'개';
  if(!q.length){
    wrap.innerHTML='<div class="pq-empty">대기열이 비어있습니다.<br>슬롯 편집 화면에서 🏷 인쇄추가 버튼을 눌러주세요.</div>';
    return;
  }
  let h='<div class="pq-list">';
  q.forEach(function(x,i){
    const mc=MAT_COLORS[x.mat]||'#999';

  wrap.innerHTML=h;
}

  if(!q.length){showToast('인쇄할 항목이 없습니다');return;}
  const area=document.getElementById('pqPrintArea');
  const printAreaOld=document.getElementById('printArea');
  const baseUrl=location.origin+location.pathname;
  const LBL_COLORS={CN10:'#d4a017',CN20:'#4b5563',RS40:'#7dd3e8',RS20:'#9ca3af',CM20:'#c4956a'};

  q.forEach(function(x,i){
    try{
      new QRCode(document.getElementById('pqlQr'+i),{

function pqSwitchMode(mode){

  document.getElementById('pqTabLabel').classList.toggle('on',mode==='label');
  document.getElementById('pqModeQueue').style.display=mode==='queue'?'':'none';
  document.getElementById('pqModeLabel').style.display=mode==='label'?'':'none';
  if(mode==='label') initLabelSections();
}

function initLabelSections(){
  const sel=document.getElementById('lblSec');
  const old=sel.value;
  sel.innerHTML='<option value="all">전체 섹션</option>';
  const secs=[...new Set(data.map(d=>d.section))].sort();
  secs.forEach(s=>{
    const o=document.createElement('option');o.value=s;o.textContent='섹션 '+s;sel.appendChild(o);
  });
  sel.value=old||'all';
  renderLabels();
}

function getLblSize(){
  const r=document.querySelector('input[name=lblSz]:checked');
  return r?r.value:'md';
}

function renderLabels(){
  const sec=document.getElementById('lblSec').value;
  const sz=getLblSize();
  const qsz=sz==='lg'?76:sz==='md'?56:40;
  const baseUrl=location.origin+location.pathname;
  const list=data.filter(d=>sec==='all'||d.section===sec)
    .sort((a,b)=>a.section.localeCompare(b.section)||(a.floor-b.floor)||(a.order-b.order));

  document.getElementById('lblCount').textContent=list.length+'개';
  const wrap=document.getElementById('lblPreview');
  wrap.innerHTML='';

  list.forEach(d=>{
    const loc=`${d.section}${d.floor}-${d.order}`;
    const clr=MAT_COLORS[d.material]||'#94a3b8';
    const card=document.createElement('div');
    card.className='lbl-card '+sz;

    // 좌측: 소재색 배경 + 위치 + 소재명
    let h='<div class="lbl-left" style="background:'+clr+'">';
    h+='<div class="lbl-loc">'+loc+'</div>';
    if(d.material) h+='<div class="lbl-matname">'+d.material+'</div>';
    h+='</div>';
    // 우측: 치수 + 타입 + QR
    h+='<div class="lbl-right">';
    h+='<div class="lbl-info">';
    if(d.item) h+='<div class="lbl-item">'+d.item+'</div>';
    if(d.type) h+='<div class="lbl-type">'+d.type+'</div>';
    h+='</div>';
    h+='<div class="lbl-qr"></div>';
    h+='</div>';
    card.innerHTML=h;
    wrap.appendChild(card);

    try{
      new QRCode(card.querySelector('.lbl-qr'),{
        text:baseUrl+'?slot='+encodeURIComponent(loc),
        width:qsz,height:qsz,
        colorDark:'#000',colorLight:'#fff',
        correctLevel:QRCode.CorrectLevel.M
      });
    }catch(e){}
  });
}

function printLabels(){
  const wrap=document.getElementById('lblPreview');
  if(!wrap.children.length){showToast('인쇄할 라벨이 없습니다');return;}
  // 라벨 영역만 인쇄
  const area=document.getElementById('pqPrintArea');
  area.innerHTML=wrap.innerHTML;
  area.style.display='block';
  document.querySelectorAll('.panel,.topbar,.tabbar,.sheet-backdrop,.sheet,.toast,.search-result-panel').forEach(el=>{el.dataset.pqHide=el.style.display||'';el.style.display='none';});
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      document.querySelectorAll('[data-pq-hide]').forEach(el=>{el.style.display=el.dataset.pqHide;delete el.dataset.pqHide;});
      area.style.display='none';
    },500);
  },300);
}

// 초기 로딩: 구글 시트에서 데이터 가져온 후 렌더
// QR코드 스캔 시 슬롯 자동 오픈
function handleQRParam(){
  const params = new URLSearchParams(window.location.search);
  const slot = params.get('slot');
  if(!slot) return;
  // 데이터 로드 후 해당 슬롯 찾아서 열기
  const d = data.find(d=>`${d.section}${d.floor}-${d.order}`===slot);
  if(d){
    switchTab('full');
    setTimeout(()=>{ openSection(d.section); setTimeout(()=>openSheet(d.id),300); },300);
  }
}
loadFromCache(); // 캐시 먼저 보여주고
renderAll();     // 즉시 화면 표시
loadFromSheet(); // 백그라운드에서 서버 최신 데이터 가져오기
</script>

<script>
/* ── 전체지도 핀치줌 + 드래그 ── */
(function(){
  const viewport = document.getElementById('mapViewport');
  const canvas   = document.getElementById('mapCanvas');
  if(!viewport||!canvas) return;

  let scale=1, minScale=0.15, maxScale=3;
  let originX=0, originY=0;
  let lastDist=0, lastMidX=0, lastMidY=0;
  let dragging=false, dragStartX=0, dragStartY=0, dragOriginX=0, dragOriginY=0;

  function applyTransform(){
    canvas.style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
  }

  function clampOrigin(){
    // 최소: 캔버스가 뷰포트 밖으로 완전히 나가지 않게
    const vw=viewport.clientWidth, vh=viewport.clientHeight;
    const cw=canvas.scrollWidth*scale, ch=canvas.scrollHeight*scale;
    const minX=Math.min(0, vw-cw), minY=Math.min(0, vh-ch);
    originX=Math.max(minX, Math.min(0, originX));
    originY=Math.max(minY, Math.min(0, originY));
  }

  // 초기 스케일: 전체가 화면에 들어오게
  function initScale(){
    const vw=viewport.clientWidth, vh=viewport.clientHeight;
    const cw=canvas.scrollWidth, ch=canvas.scrollHeight;
    if(!cw||!ch) return;
    scale=Math.min(vw/cw, vh/ch, 1) * 0.95;
    originX=0; originY=0;
    applyTransform();
  }

  // fullview 탭 열릴 때 초기화
  const origRenderFullView = window.renderFullView;
  window.renderFullView = function(){
    origRenderFullView && origRenderFullView();
    setTimeout(initScale, 100);
  };
  // 로컬 파일 포함 다양한 환경에서 확실히 실행
  setTimeout(initScale, 100);
  setTimeout(initScale, 500);
  setTimeout(initScale, 1500);
  window.addEventListener('load', ()=>setTimeout(initScale, 200));

  // 터치 이벤트
  viewport.addEventListener('touchstart', e=>{
    if(e.touches.length===2){ e.preventDefault();
      const t0=e.touches[0], t1=e.touches[1];
      lastDist=Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
      lastMidX=(t0.clientX+t1.clientX)/2;
      lastMidY=(t0.clientY+t1.clientY)/2;
      dragging=false;
    } else if(e.touches.length===1){
      dragging=true;
      dragStartX=e.touches[0].clientX;
      dragStartY=e.touches[0].clientY;
      dragOriginX=originX;
      dragOriginY=originY;
    }
  },{passive:false});

  viewport.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const t0=e.touches[0], t1=e.touches[1];
      const dist=Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
      const midX=(t0.clientX+t1.clientX)/2;
      const midY=(t0.clientY+t1.clientY)/2;
      const rect=viewport.getBoundingClientRect();

      const ratio=dist/lastDist;
      const newScale=Math.max(minScale, Math.min(maxScale, scale*ratio));

      // 줌 중심점 기준으로 origin 조정
      const focalX=midX-rect.left;
      const focalY=midY-rect.top;
      originX=focalX-(focalX-originX)*(newScale/scale);
      originY=focalY-(focalY-originY)*(newScale/scale);
      scale=newScale;

      // 드래그도 동시에
      originX+=midX-lastMidX;
      originY+=midY-lastMidY;

      lastDist=dist; lastMidX=midX; lastMidY=midY;
      clampOrigin();
      applyTransform();
    } else if(e.touches.length===1 && dragging){
      e.preventDefault();
      originX=dragOriginX+(e.touches[0].clientX-dragStartX);
      originY=dragOriginY+(e.touches[0].clientY-dragStartY);
      clampOrigin();
      applyTransform();
    }
  },{passive:false});

  viewport.addEventListener('touchend', e=>{
    if(e.touches.length<2) lastDist=0;
    if(e.touches.length===0) dragging=false;
  },{passive:true});

  // 마우스 휠 (데스크탑) → 스크롤 이동
  viewport.addEventListener('wheel', e=>{
    e.preventDefault();
    originX -= e.deltaX || 0;
    originY -= e.deltaY || 0;
    clampOrigin();
    applyTransform();
  },{passive:false});

  // 더블탭 = 100% 리셋
  let lastTap=0;
  viewport.addEventListener('touchend', e=>{
    const now=Date.now();
    if(now-lastTap<300){ initScale(); }
    lastTap=now;
  },{passive:true});
})();
</script>
